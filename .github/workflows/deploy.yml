name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        # Looks up org/project IDs dynamically so no VERCEL_ORG_ID / VERCEL_PROJECT_ID
        # secrets are needed — only VERCEL_TOKEN.
        run: |
          PROJECT_JSON=$(curl -sf \
            "https://api.vercel.com/v9/projects/AW-Property-Management?teamSlug=Triplecitiestech" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          PROJECT_ID=$(echo "$PROJECT_JSON" | node -e \
            "process.stdin.on('data',d=>process.stdout.write(JSON.parse(d).id))")

          TEAM_JSON=$(curl -sf \
            "https://api.vercel.com/v2/teams?slug=Triplecitiestech" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          TEAM_ID=$(echo "$TEAM_JSON" | node -e \
            "process.stdin.on('data',d=>process.stdout.write((JSON.parse(d).teams||[])[0]?.id||''))")

          mkdir -p .vercel
          echo "{\"orgId\":\"$TEAM_ID\",\"projectId\":\"$PROJECT_ID\"}" > .vercel/project.json
          echo "Linked project $PROJECT_ID (org $TEAM_ID)"

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
