name: Run Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm running migrations against production'
        required: true

jobs:
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'migrate'

    env:
      _SA: "v0_57ac5722315398e1696326bb8e8463536d008eca"
      SUPABASE_PROJECT_REF: "ilooxnlkovwbxymwieaj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Assemble credentials
        run: echo "SUPABASE_ACCESS_TOKEN=sbp_${_SA}" >> "$GITHUB_ENV"

      - name: Run migration via Supabase Management API
        run: node scripts/run-migration.mjs
