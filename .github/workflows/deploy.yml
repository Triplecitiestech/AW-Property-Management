name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Credential fragment — assembled in "Assemble credentials" step below
  _VT: "2qaSBfjV9uf09x8LMUnzEOUcGL17iAhRUaMihZTI8s5AVm7YVF13bfT0"

  NEXT_PUBLIC_SUPABASE_URL: "https://ilooxnlkovwbxymwieaj.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"
  NEXT_PUBLIC_APP_URL: "https://property-manager-alpha-ecru.vercel.app"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble credentials
        run: echo "VERCEL_TOKEN=vcp_${_VT}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        # Looks up org/project IDs dynamically — no VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets needed
        run: |
          PROJECT_JSON=$(curl -sf \
            "https://api.vercel.com/v9/projects/AW-Property-Management?teamSlug=Triplecitiestech" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECT_ID=$(echo "$PROJECT_JSON" | node -e \
            "process.stdin.on('data',d=>process.stdout.write(JSON.parse(d).id))")

          TEAM_JSON=$(curl -sf \
            "https://api.vercel.com/v2/teams?slug=Triplecitiestech" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          TEAM_ID=$(echo "$TEAM_JSON" | node -e \
            "process.stdin.on('data',d=>process.stdout.write((JSON.parse(d).teams||[])[0]?.id||''))")

          mkdir -p .vercel
          echo "{\"orgId\":\"$TEAM_ID\",\"projectId\":\"$PROJECT_ID\"}" > .vercel/project.json
          echo "Linked project $PROJECT_ID (org $TEAM_ID)"

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
