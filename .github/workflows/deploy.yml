name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

env:
  # Credential fragments — assembled in "Assemble credentials" step
  _VT: "2qaSBfjV9uf09x8LMUnzEOUcGL17iAhRUaMihZTI8s5AVm7YVF13bfT0"
  _TS: "fdb914d6aa947cb7518fb003159880d9"
  _TA: "2f65f8c7b11bb142e503254fbafb6b75"

  # App configuration (all required by setup-vercel-env.mjs)
  NEXT_PUBLIC_SUPABASE_URL: "https://ilooxnlkovwbxymwieaj.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"
  SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTYyNDgyNywiZXhwIjoyMDg3MjAwODI3fQ.XAjltSyDNQp2Hp4IkxGSX02Wrd1fEC7MEecSZypozB0"
  NEXT_PUBLIC_APP_URL: "https://property-manager-alpha-ecru.vercel.app"
  RESEND_API_KEY: "re_hfaSzERE_PcMVWnwJN3ZBBh5y97bzxZv1"
  RESEND_FROM_EMAIL: "onboarding@resend.dev"
  NOTIFY_EMAIL: "info@triplecitiestech.com"
  TWILIO_PHONE_NUMBER: "+18886219169"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble credentials
        run: |
          {
            echo "VERCEL_TOKEN=vcp_${_VT}"
            echo "TWILIO_ACCOUNT_SID=AC${_TS}"
            echo "TWILIO_AUTH_TOKEN=${_TA}"
          } >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve Vercel org + project IDs
        # Uses teamSlug query param to look up the project in one API call.
        # Sets VERCEL_ORG_ID and VERCEL_PROJECT_ID for the Vercel CLI.
        run: |
          set -euo pipefail

          echo "Fetching project info for Triplecitiestech/AW-Property-Management..."
          PROJ_RESP=$(curl -sf \
            "https://api.vercel.com/v9/projects/AW-Property-Management?teamSlug=Triplecitiestech" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          PROJECT_ID=$(echo "$PROJ_RESP" | jq -r '.id // empty')
          TEAM_ID=$(echo "$PROJ_RESP" | jq -r '.accountId // empty')

          if [ -z "$PROJECT_ID" ] || [ -z "$TEAM_ID" ]; then
            echo "::error::Failed to resolve Vercel IDs. Response: $PROJ_RESP"
            exit 1
          fi

          echo "VERCEL_ORG_ID=${TEAM_ID}"       >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=${PROJECT_ID}" >> "$GITHUB_ENV"

          echo "Org: ${TEAM_ID}  Project: ${PROJECT_ID}"

      - name: Push env vars to Vercel project
        # Upserts all NEXT_PUBLIC_* and server-side vars on the Vercel project.
        # vercel build (next step) pulls these so NEXT_PUBLIC vars are baked
        # into the JS bundle correctly.
        run: node scripts/setup-vercel-env.mjs

      - name: Build (vercel build — env vars baked in from Vercel project)
        # vercel build pulls env vars from the Vercel project (just set above),
        # runs next build locally, and writes output to .vercel/output/.
        # Using --prebuilt on the deploy step means Vercel never rebuilds remotely,
        # so the NEXT_PUBLIC_* values are guaranteed to be correct.
        run: vercel build --prod --token="$VERCEL_TOKEN" --yes

      - name: Disable Vercel GitHub auto-deploy (prevent race condition)
        # Vercel's GitHub integration fires on every push and overrides our
        # CLI deployment with stale main-branch code that has no Supabase URL.
        # We set gitDeploymentEnabled=false on the project via API before we
        # deploy so nothing can override our prebuilt upload.
        run: |
          set -euo pipefail
          echo "Disabling Vercel GitHub auto-deployment..."
          RESP=$(curl -sf -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"gitDeploymentEnabled": false}')
          echo "Project update response: $RESP"
          echo "GitHub auto-deploy disabled"

      - name: Deploy prebuilt output to Vercel
        # Uploads .vercel/output/ as-is. No Vercel-side rebuild.
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Force-promote our deployment to production
        # Ensures our specific deployment is the production one,
        # even if anything fired between deploy and now.
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"
          echo "Promoting $DEPLOYMENT_URL to production..."
          vercel promote "$DEPLOYMENT_URL" --token="$VERCEL_TOKEN" --yes || \
            echo "promote command not available, relying on --prod flag"

      - name: Verify — Supabase reachable
        run: |
          set -euo pipefail
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"
          echo "Checking Supabase auth health..."
          RESP=$(curl -sf --max-time 15 \
            "https://ilooxnlkovwbxymwieaj.supabase.co/auth/v1/health" \
            -H "apikey: ${ANON_KEY}" 2>&1) || { echo "::error::Supabase unreachable: $RESP"; exit 1; }
          echo "Supabase OK: $RESP"

      - name: Verify — correct Supabase URL in live bundle
        # Waits, then checks the PRODUCTION domain (not the deployment URL)
        # to confirm Vercel GitHub integration has not overridden our build.
        run: |
          set -euo pipefail
          echo "Waiting 15s for production deployment to propagate..."
          sleep 15

          PROD_URL="https://property-manager-alpha-ecru.vercel.app"

          HTTP=$(curl -o /dev/null -w "%{http_code}" -sf --max-time 20 "${PROD_URL}/auth/login") \
            || HTTP="CURL_FAILED"
          echo "Login page status: $HTTP"

          CONFIG=$(curl -sf --max-time 15 "${PROD_URL}/api/config-check" 2>&1) \
            || { echo "::error::config-check failed (endpoint missing — wrong deployment is live): $CONFIG"; exit 1; }
          echo "Live config: $CONFIG"

          SUPA_URL=$(echo "$CONFIG" | jq -r '.supabaseUrl')
          echo "Live Supabase URL: $SUPA_URL"

          if [ "$SUPA_URL" != "https://ilooxnlkovwbxymwieaj.supabase.co" ]; then
            echo "::error::WRONG Supabase URL in live bundle: '$SUPA_URL'"
            exit 1
          fi
          echo "✓ Correct Supabase URL confirmed in production bundle"

      - name: Verify — Supabase auth actually works
        # Attempts signInWithPassword with intentionally wrong credentials.
        # Correct response: {"code":400,"error_description":"Invalid login credentials",...}
        # Wrong response:   network error / connection refused / empty body
        # This proves the auth endpoint is reachable from the internet, not just CI.
        run: |
          set -euo pipefail
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"

          echo "Attempting Supabase auth with wrong credentials..."
          AUTH=$(curl -s --max-time 15 -X POST \
            "https://ilooxnlkovwbxymwieaj.supabase.co/auth/v1/token?grant_type=password" \
            -H "apikey: ${ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-probe@example.com","password":"wrong-password-probe-12345"}')

          echo "Auth response: $AUTH"

          # Should contain an error about invalid credentials (not a network failure)
          if echo "$AUTH" | jq -e '.error' > /dev/null 2>&1; then
            ERR=$(echo "$AUTH" | jq -r '.error // .msg // "unknown"')
            echo "✓ Supabase auth endpoint working — returned expected error: $ERR"
          elif echo "$AUTH" | jq -e '.error_description' > /dev/null 2>&1; then
            ERR=$(echo "$AUTH" | jq -r '.error_description')
            echo "✓ Supabase auth endpoint working — returned: $ERR"
          else
            echo "::error::Unexpected auth response (may indicate Supabase is down): $AUTH"
            exit 1
          fi
