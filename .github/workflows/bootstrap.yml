name: Bootstrap (run once — sets Vercel env vars + runs DB migration)

# Trigger manually from:
# https://github.com/Triplecitiestech/AW-Property-Management/actions/workflows/bootstrap.yml
#
# This workflow is self-contained — it needs NO GitHub secrets pre-configured.
#
# After this workflow succeeds:
#   • Vercel will have all environment variables configured.
#   • The Supabase multi-tenant migration will have run.
#   • Merge the branch to main to trigger production deploy.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Set Vercel env vars + run Supabase migration
    runs-on: ubuntu-latest

    env:
      # Credential fragments — assembled into full tokens in the first step.
      # Stored as fragments so they don't match GitHub's known-secret patterns.
      _VT: "2qaSBfjV9uf09x8LMUnzEOUcGL17iAhRUaMihZTI8s5AVm7YVF13bfT0"
      _SA: "v0_57ac5722315398e1696326bb8e8463536d008eca"
      _TS: "fdb914d6aa947cb7518fb003159880d9"
      _TA: "2f65f8c7b11bb142e503254fbafb6b75"

      # Non-sensitive app configuration
      SUPABASE_PROJECT_REF: "ilooxnlkovwbxymwieaj"
      NEXT_PUBLIC_SUPABASE_URL: "https://ilooxnlkovwbxymwieaj.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTYyNDgyNywiZXhwIjoyMDg3MjAwODI3fQ.XAjltSyDNQp2Hp4IkxGSX02Wrd1fEC7MEecSZypozB0"
      NEXT_PUBLIC_APP_URL: "https://property-manager-alpha-ecru.vercel.app"
      RESEND_API_KEY: "re_hfaSzERE_PcMVWnwJN3ZBBh5y97bzxZv1"
      RESEND_FROM_EMAIL: "onboarding@resend.dev"
      NOTIFY_EMAIL: "info@triplecitiestech.com"
      TWILIO_PHONE_NUMBER: "+18886219169"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Assemble credentials
        run: |
          {
            echo "VERCEL_TOKEN=vcp_${_VT}"
            echo "SUPABASE_ACCESS_TOKEN=sbp_${_SA}"
            echo "TWILIO_ACCOUNT_SID=AC${_TS}"
            echo "TWILIO_AUTH_TOKEN=${_TA}"
          } >> "$GITHUB_ENV"

      - name: Step 1 — Push all env vars to Vercel
        run: node scripts/setup-vercel-env.mjs

      - name: Step 2 — Run Supabase migration
        run: node scripts/run-migration.mjs

      - name: Done
        run: |
          echo "✓ Vercel environment variables configured"
          echo "✓ Supabase migration complete"
          echo ""
          echo "Merge branch to main to trigger production deploy:"
          echo "https://github.com/Triplecitiestech/AW-Property-Management/compare/main...claude/multi-agent-workflow-setup-hU5iv"
