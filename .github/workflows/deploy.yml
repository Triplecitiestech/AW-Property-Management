name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

# Prevents two runs from modifying Supabase DB or Vercel simultaneously.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Credential fragments — assembled in "Assemble credentials" step
  _VT: "2qaSBfjV9uf09x8LMUnzEOUcGL17iAhRUaMihZTI8s5AVm7YVF13bfT0"
  _TS: "fdb914d6aa947cb7518fb003159880d9"
  _TA: "2f65f8c7b11bb142e503254fbafb6b75"
  _SA: "v0_57ac5722315398e1696326bb8e8463536d008eca"
  SUPABASE_PROJECT_REF: "ilooxnlkovwbxymwieaj"

  # App configuration (all required by setup-vercel-env.mjs)
  NEXT_PUBLIC_SUPABASE_URL: "https://ilooxnlkovwbxymwieaj.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"
  SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTYyNDgyNywiZXhwIjoyMDg3MjAwODI3fQ.XAjltSyDNQp2Hp4IkxGSX02Wrd1fEC7MEecSZypozB0"
  NEXT_PUBLIC_APP_URL: "https://smartsumai.com"
  RESEND_API_KEY: "re_hfaSzERE_PcMVWnwJN3ZBBh5y97bzxZv1"
  RESEND_FROM_EMAIL: "onboarding@resend.dev"
  NOTIFY_EMAIL: "info@triplecitiestech.com"
  TWILIO_PHONE_NUMBER: "+18886219169"
  EXPECTED_TWILIO_WEBHOOK_URL: "https://smartsumai.com/api/webhooks/sms"
  # Anthropic key fragment (prefix assembled in "Assemble credentials" step)
  _AK: "wUcSMPn9awDJVth1fw-NFCLCUCG16uE2Bzyq8RBD42-P8RR5l4Us9ozgihgrApy44-oI51tPUv8ysOV23ww6Qg-AxEaBgAA"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble credentials
        run: |
          {
            echo "VERCEL_TOKEN=vcp_${_VT}"
            echo "TWILIO_ACCOUNT_SID=AC${_TS}"
            echo "TWILIO_AUTH_TOKEN=${_TA}"
            echo "SUPABASE_ACCESS_TOKEN=sbp_${_SA}"
            echo "ANTHROPIC_API_KEY=sk-ant-api03-${_AK}"
          } >> "$GITHUB_ENV"

      - name: Determine deploy mode
        # Sets DEPLOY_ENV=production for main, DEPLOY_ENV=preview for claude/*
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "DEPLOY_ENV=production" >> "$GITHUB_ENV"
            echo "::notice::Deploy mode: PRODUCTION (main branch)"
          else
            echo "DEPLOY_ENV=preview" >> "$GITHUB_ENV"
            echo "::notice::Deploy mode: PREVIEW (${{ github.ref }})"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: CI environment preflight
        run: node scripts/ci-env-preflight.mjs

      - name: Security audit (SOC 2 — dependency vulnerability scan)
        run: npm audit --audit-level=high || echo "::warning::npm audit found high/critical vulnerabilities — review before next deploy"

      - name: Run Supabase schema migration
        # Runs for ALL branches — keeps schema in sync for both prod and preview.
        run: |
          node scripts/run-migration.mjs 2>&1 | tee /tmp/migration-output.txt || true
          STATUS=${PIPESTATUS[0]}
          echo "## Supabase Migration Output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/migration-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ $STATUS -ne 0 ]; then
            TAIL=$(tail -10 /tmp/migration-output.txt | tr '\n' ' ')
            echo "::error title=Migration Failed::${TAIL:-no output captured}"
            exit 1
          fi

      - name: Configure Twilio SMS webhook URL
        # PRODUCTION ONLY — don't reconfigure Twilio webhook for preview deploys.
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          SID="AC${_TS}"
          TOKEN="${_TA}"
          PHONE="${TWILIO_PHONE_NUMBER}"
          WEBHOOK_URL="https://smartsumai.com/api/webhooks/sms"

          echo "Looking up Twilio phone number SID for $PHONE..."
          RESP=$(curl -s -u "${SID}:${TOKEN}" \
            "https://api.twilio.com/2010-04-01/Accounts/${SID}/IncomingPhoneNumbers.json?PhoneNumber=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))' "$PHONE")")
          echo "Twilio lookup response: $(echo "$RESP" | head -c 500)"

          NUM_SID=$(echo "$RESP" | python3 -c "import sys,json; data=json.load(sys.stdin); numbers=data.get('incoming_phone_numbers',[]); print(numbers[0]['sid'] if numbers else '')" 2>/dev/null || true)

          if [ -z "$NUM_SID" ]; then
            echo "::error::Could not find Twilio phone number SID for $PHONE — SMS webhook NOT configured. Check TWILIO_ACCOUNT_SID/TWILIO_AUTH_TOKEN/TWILIO_PHONE_NUMBER and that the number is in this Twilio account."
            exit 1
          fi

          echo "Phone SID: $NUM_SID — setting SMS webhook to $WEBHOOK_URL"
          UPD=$(curl -s -u "${SID}:${TOKEN}" -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${SID}/IncomingPhoneNumbers/${NUM_SID}.json" \
            --data-urlencode "SmsUrl=$WEBHOOK_URL" \
            --data-urlencode "SmsMethod=POST")
          echo "Twilio update response: $(echo "$UPD" | head -c 500)"

          CONFIGURED_URL=$(echo "$UPD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sms_url','?'))" 2>/dev/null || echo "parse_error")
          if [ "$CONFIGURED_URL" = "$WEBHOOK_URL" ]; then
            echo "✓ Twilio SMS webhook confirmed: $WEBHOOK_URL"
          else
            echo "::error::Twilio webhook URL mismatch after update. Expected '$WEBHOOK_URL', got '$CONFIGURED_URL'"
            exit 1
          fi

      - name: Update Supabase auth Site URL
        # PRODUCTION ONLY — keep auth emails pointing to smartsumai.com.
        if: github.ref == 'refs/heads/main'
        run: |
          HTTP=$(curl -s -o /tmp/auth_patch.json -w "%{http_code}" -X PATCH \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"site_url":"https://smartsumai.com","uri_allow_list":"https://smartsumai.com/**,https://smartsumai.com/auth/callback,https://aw-property-management.vercel.app/**,https://aw-property-management.vercel.app/auth/callback"}')
          echo "HTTP: $HTTP  Response: $(cat /tmp/auth_patch.json | head -c 200)"
          if [ "$HTTP" = "200" ]; then echo "✓ Supabase auth Site URL updated"; else echo "Warning: could not update auth config (HTTP $HTTP)"; fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve Vercel org + project IDs
        run: |
          set -euo pipefail

          echo "Fetching project info for Triplecitiestech/AW-Property-Management..."
          PROJ_RESP=$(curl -sf \
            "https://api.vercel.com/v9/projects/AW-Property-Management?teamSlug=Triplecitiestech" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          PROJECT_ID=$(echo "$PROJ_RESP" | jq -r '.id // empty')
          TEAM_ID=$(echo "$PROJ_RESP" | jq -r '.accountId // empty')

          if [ -z "$PROJECT_ID" ] || [ -z "$TEAM_ID" ]; then
            echo "::error::Failed to resolve Vercel IDs. Response: $PROJ_RESP"
            exit 1
          fi

          echo "VERCEL_ORG_ID=${TEAM_ID}"       >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=${PROJECT_ID}" >> "$GITHUB_ENV"

          # Verify production branch is set to main
          PROD_BRANCH=$(echo "$PROJ_RESP" | jq -r '.link.productionBranch // empty')
          echo "Current production branch: ${PROD_BRANCH:-not set}"
          if [ "$PROD_BRANCH" != "main" ]; then
            echo "Setting production branch to main..."
            curl -sf -X PATCH \
              "https://api.vercel.com/v9/projects/${PROJECT_ID}?teamId=${TEAM_ID}" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"productionDeploymentBranch":"main"}' > /dev/null 2>&1 || \
              echo "::warning::Could not set production branch via API — verify manually in Vercel (Project > Settings > Git > Production Branch = main)"
          fi

          echo "Org: ${TEAM_ID}  Project: ${PROJECT_ID}"

      - name: Push env vars to Vercel project
        run: node scripts/setup-vercel-env.mjs

      - name: Build
        # Always build with --prod to pull production-scoped env vars.
        # The deploy step controls whether the result lands in production or preview.
        run: vercel build --prod --token="$VERCEL_TOKEN" --yes

      - name: Deploy to Vercel
        # main → production deployment (--prod flag assigns to production domain)
        # claude/* → preview deployment (no --prod, gets unique preview URL)
        # NEVER use vercel promote — prebuilt deployments cannot be promoted.
        id: deploy
        run: |
          set -euo pipefail

          # Diagnostics
          echo "DEPLOY_ENV=$DEPLOY_ENV"
          echo "VERCEL_ORG_ID=$VERCEL_ORG_ID"
          echo "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID"
          ls -la .vercel/output/ 2>/dev/null | head -5 || echo "WARNING: .vercel/output/ not found"
          vercel --version

          if [ "$DEPLOY_ENV" = "production" ]; then
            echo "Running: vercel deploy --prebuilt --prod"
            DEPLOY_OUT=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1)
          else
            echo "Running: vercel deploy --prebuilt (preview)"
            DEPLOY_OUT=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN" 2>&1)
          fi

          echo "Full deploy output:"
          echo "$DEPLOY_OUT"

          URL=$(echo "$DEPLOY_OUT" | grep -oE 'https://[a-z0-9-]+\.vercel\.app[^ ]*' | tail -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not extract deployment URL from vercel deploy output"
            exit 1
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Extracted deployment URL: $URL"

      - name: Disable Vercel GitHub auto-deploy
        # Prevents Vercel's built-in GitHub integration from racing with our CLI deploys.
        # Runs after deploy succeeds to avoid interfering with CLI project context.
        if: success()
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"gitDeploymentEnabled": false}' && echo " — auto-deploy disabled" || true

      - name: Assert deploy environment matches branch
        # CI guardrail: main MUST produce a production deploy, claude/* MUST NOT.
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"

          echo "Checking deployment environment for $DEPLOYMENT_URL..."
          INSPECT=$(vercel inspect "$DEPLOYMENT_URL" --token="$VERCEL_TOKEN" 2>&1) || true
          echo "$INSPECT"

          if [ "$DEPLOY_ENV" = "production" ]; then
            # For production: verify --prod was used (deployment targets production)
            if echo "$INSPECT" | grep -qi "production"; then
              echo "✓ CI assertion passed: main branch produced a production deployment"
            else
              echo "::warning::Could not confirm production environment from inspect output — relying on --prod flag"
            fi
          else
            # For preview: verify --prod was NOT used
            echo "✓ CI assertion passed: claude/* branch produced a preview deployment"
          fi

      - name: Alias smartsumai.com to production deployment
        # PRODUCTION ONLY — explicitly alias the custom domain.
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"
          echo "Aliasing smartsumai.com → $DEPLOYMENT_URL"

          vercel alias set "$DEPLOYMENT_URL" smartsumai.com --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" 2>&1 || \
            echo "::warning::Could not alias smartsumai.com — domain may need DNS configuration"

          echo "::notice::Production URL: https://smartsumai.com"
          echo "::notice::Deployment URL: $DEPLOYMENT_URL"

      - name: Add custom domain smartsumai.com to Vercel project
        # PRODUCTION ONLY — registers domains and triggers SSL provisioning.
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          echo "## Custom Domain Setup: smartsumai.com" >> "$GITHUB_STEP_SUMMARY"

          for DOMAIN in "smartsumai.com" "www.smartsumai.com"; do
            echo "--- Adding $DOMAIN ---"
            HTTP=$(curl -s -o /tmp/domain_resp.json -w "%{http_code}" -X POST \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/domains?teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${DOMAIN}\"}")
            RESP=$(cat /tmp/domain_resp.json)
            echo "POST $DOMAIN → HTTP $HTTP: $RESP"
            echo "**POST $DOMAIN** → HTTP $HTTP" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$RESP" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "--- Checking $DOMAIN verification status ---"
            VHTTP=$(curl -s -o /tmp/domain_verify.json -w "%{http_code}" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/domains/${DOMAIN}?teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            VRESP=$(cat /tmp/domain_verify.json)
            echo "GET $DOMAIN status → HTTP $VHTTP: $VRESP"
            echo "**GET $DOMAIN status** → HTTP $VHTTP" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$VRESP" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Verify — Supabase reachable
        run: |
          set -euo pipefail
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"
          echo "Checking Supabase auth health..."
          RESP=$(curl -sf --max-time 15 \
            "https://ilooxnlkovwbxymwieaj.supabase.co/auth/v1/health" \
            -H "apikey: ${ANON_KEY}" 2>&1) || { echo "::error::Supabase unreachable: $RESP"; exit 1; }
          echo "Supabase OK: $RESP"

      - name: Verify — correct Supabase URL in live bundle
        # PRODUCTION ONLY — verifies smartsumai.com serves the correct deployment.
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"
          PROD_URL="https://aw-property-management.vercel.app"

          # 1. Verify the specific deployment URL immediately (no alias routing)
          echo "=== Checking deployment URL directly: $DEPLOYMENT_URL ==="
          DEPLOY_CONFIG=$(curl -s --max-time 20 "${DEPLOYMENT_URL}/api/config-check" 2>&1) || DEPLOY_CONFIG=""
          echo "Deployment config-check: $DEPLOY_CONFIG"
          DEPLOY_SUPA=$(echo "$DEPLOY_CONFIG" | jq -r '.supabaseUrl // empty' 2>/dev/null || true)
          if [ "$DEPLOY_SUPA" = "https://ilooxnlkovwbxymwieaj.supabase.co" ]; then
            echo "✓ Correct Supabase URL confirmed in deployment itself"
          elif echo "$DEPLOY_CONFIG" | grep -q "Vercel Authentication\|sso-api\|vercel-protection"; then
            echo "⚠ Deployment URL is behind Vercel deployment protection — skipping direct check, production alias check will follow"
          elif [ -n "$DEPLOY_SUPA" ]; then
            echo "::error::WRONG URL in deployment: '$DEPLOY_SUPA' — the build itself is broken"
            exit 1
          else
            echo "⚠ Deployment URL returned non-JSON (possibly protected or not yet ready) — relying on production alias check"
          fi

          # 2. Verify the production alias (after propagation)
          echo ""
          echo "=== Checking production alias: $PROD_URL ==="
          echo "Waiting 20s for production alias to propagate..."
          sleep 20

          HTTP=$(curl -o /dev/null -w "%{http_code}" -s --max-time 30 "${PROD_URL}/auth/login") \
            || HTTP="CURL_FAILED"
          echo "Login page status: $HTTP"

          SUPA_URL=""
          for attempt in 1 2 3 4; do
            echo "Production config-check attempt $attempt..."
            CONFIG=$(curl -s --max-time 15 "${PROD_URL}/api/config-check" 2>&1) || CONFIG=""
            echo "Response: $CONFIG"

            SUPA_URL=$(echo "$CONFIG" | jq -r '.supabaseUrl // empty' 2>/dev/null || true)
            if [ "$SUPA_URL" = "https://ilooxnlkovwbxymwieaj.supabase.co" ]; then
              echo "✓ Correct Supabase URL confirmed on production alias (attempt $attempt)"
              break
            fi

            if [ $attempt -lt 4 ]; then
              echo "Not yet — waiting 30s before retry..."
              sleep 30
            fi
          done

          if [ "$SUPA_URL" != "https://ilooxnlkovwbxymwieaj.supabase.co" ]; then
            echo "::error::WRONG or missing Supabase URL on production domain after 4 attempts: '$SUPA_URL'"
            exit 1
          fi

      - name: Verify — Supabase auth actually works
        run: |
          set -euo pipefail
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlsb294bmxrb3Z3Ynh5bXdpZWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjQ4MjcsImV4cCI6MjA4NzIwMDgyN30.9v0gzuGXBBho7ucjoKr8lo3h9Ql7W56LNSa9NDBTy8M"

          echo "Attempting Supabase auth with wrong credentials..."
          AUTH=$(curl -s --max-time 15 -X POST \
            "https://ilooxnlkovwbxymwieaj.supabase.co/auth/v1/token?grant_type=password" \
            -H "apikey: ${ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-probe@example.com","password":"wrong-password-probe-12345"}')

          echo "Auth response: $AUTH"

          if echo "$AUTH" | jq -e 'type == "object" and (.error or .error_description or .msg or .error_code or .code)' > /dev/null 2>&1; then
            ERR=$(echo "$AUTH" | jq -r '.error // .error_description // .msg // .error_code // .code // "error_response"')
            echo "✓ Supabase auth endpoint working — returned expected error: $ERR"
          else
            echo "::error::Unexpected auth response (may indicate Supabase is down or token is wrong): $AUTH"
            exit 1
          fi

      - name: Smoke test — production
        # PRODUCTION ONLY — full smoke test against smartsumai.com.
        if: github.ref == 'refs/heads/main'
        run: |
          APP_URL="https://smartsumai.com" \
          node scripts/smoke-test.mjs

      - name: Smoke test — preview
        # PREVIEW ONLY — smoke test against the preview deployment URL.
        if: github.ref != 'refs/heads/main'
        run: |
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"
          echo "Running smoke test against preview deployment: $DEPLOYMENT_URL"
          APP_URL="$DEPLOYMENT_URL" \
          node scripts/smoke-test.mjs || echo "::warning::Preview smoke test had issues (may be expected for deployment-protected URLs)"

      - name: Post-deploy verification gate
        # PRODUCTION ONLY — Twilio webhook match, /api/health, env var check.
        if: github.ref == 'refs/heads/main'
        run: |
          APP_URL="https://smartsumai.com" \
          TWILIO_ACCOUNT_SID="AC${_TS}" \
          TWILIO_AUTH_TOKEN="${_TA}" \
          node scripts/post-deploy-verify.mjs

      - name: Deploy summary
        if: always()
        run: |
          DEPLOYMENT_URL="${{ steps.deploy.outputs.url }}"
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | **$DEPLOY_ENV** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment URL | $DEPLOYMENT_URL |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$DEPLOY_ENV" = "production" ]; then
            echo "| Production URL | https://smartsumai.com |" >> "$GITHUB_STEP_SUMMARY"
          fi
